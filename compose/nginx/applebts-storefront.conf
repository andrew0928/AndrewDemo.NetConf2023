server {
    listen 80;
    server_name _;

    location = /api/swagger {
        return 302 $scheme://$http_host/swagger/index.html;
    }

    location = /swagger {
        return 302 $scheme://$http_host/swagger/index.html;
    }

    location /swagger/ {
        proxy_pass http://applebts-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /bts-api/swagger {
        return 302 $scheme://$http_host/bts-swagger/index.html;
    }

    location = /bts-swagger {
        return 302 $scheme://$http_host/bts-swagger/index.html;
    }

    location /bts-swagger/ {
        rewrite ^/bts-swagger/(.*)$ /swagger/$1 break;
        proxy_pass http://applebts-btsapi:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://applebts-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /oauth/ {
        proxy_pass http://applebts-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /bts-api/ {
        proxy_pass http://applebts-btsapi:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://applebts-storefront:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
