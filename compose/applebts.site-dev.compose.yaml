# site: applebts
# mode: site-dev
# intent: 本地完整 Apple BTS 網站驗證；docker compose up 後啟動完整 website stack。
# topology: seed + core API + BTS API + AppleBTS Storefront + nginx reverse proxy。
# database: named volume，由 AppleBTS seed 初始化；core API 與 BTS API 共用同一份資料庫。
# observability: edge、storefront 與 backend APIs 都開放 host port，方便本地偵錯；此 mode 不作為 security baseline。
name: andrewshop-applebts-site-dev

services:
  applebts-seed:
    build:
      context: ..
      dockerfile: src/AndrewDemo.NetConf2023.AppleBTS.DatabaseInit/Dockerfile
    image: andrewdemo-shop-applebts-seed:local
    environment:
      - SHOP_DATABASE_FILEPATH=/data/shop-database.db
    volumes:
      - applebts-site-dev-data:/data
    restart: "no"

  applebts-api:
    build:
      context: ..
      dockerfile: src/AndrewDemo.NetConf2023.API/Dockerfile
    image: andrewdemo-shop-common-api:local
    ports:
      - "5108:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=AppleBts
      - ASPNETCORE_HTTP_PORTS=8080
      - SHOP_DATABASE_FILEPATH=/data/shop-database.db
      - SHOP_ID=apple-bts
      - Time__Mode=${Time__Mode:-System}
      - Time__ExpectedStartupLocal=${Time__ExpectedStartupLocal:-}
      - Time__TimeZoneId=${Time__TimeZoneId:-Asia/Taipei}
    volumes:
      - applebts-site-dev-data:/data
    depends_on:
      applebts-seed:
        condition: service_completed_successfully
    restart: "no"

  applebts-btsapi:
    build:
      context: ..
      dockerfile: src/AndrewDemo.NetConf2023.AppleBTS.API/Dockerfile
    image: andrewdemo-shop-applebts-btsapi:local
    ports:
      - "5118:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=AppleBts
      - ASPNETCORE_HTTP_PORTS=8080
      - SHOP_DATABASE_FILEPATH=/data/shop-database.db
      - SHOP_ID=apple-bts
      - Time__Mode=${Time__Mode:-System}
      - Time__ExpectedStartupLocal=${Time__ExpectedStartupLocal:-}
      - Time__TimeZoneId=${Time__TimeZoneId:-Asia/Taipei}
    volumes:
      - applebts-site-dev-data:/data
    depends_on:
      applebts-seed:
        condition: service_completed_successfully
    restart: "no"

  applebts-storefront:
    build:
      context: ..
      dockerfile: src/AndrewDemo.NetConf2023.AppleBTS.Storefront/Dockerfile
    image: andrewdemo-shop-applebts-storefront:local
    ports:
      - "5139:8080"
    environment:
      - ASPNETCORE_HTTP_PORTS=8080
      - Storefront__CoreApi__BaseUrl=http://applebts-api:8080
      - Storefront__CoreApi__PublicOAuthBaseUrl=
      - Storefront__CoreApi__OAuthClientId=andrewshop-applebts-storefront
      - Storefront__AppleBtsApi__BaseUrl=http://applebts-btsapi:8080
    depends_on:
      - applebts-api
      - applebts-btsapi
    restart: "no"

  applebts-edge:
    image: nginx:1.27-alpine
    ports:
      - "5138:80"
    volumes:
      - ./nginx/applebts-storefront.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - applebts-storefront
      - applebts-api
      - applebts-btsapi
    restart: "no"

volumes:
  applebts-site-dev-data:
    driver: local
