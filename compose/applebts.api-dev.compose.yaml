# site: applebts
# mode: api-dev
# intent: Apple BTS API 開發、驗證與除錯；不啟動 seed、storefront 或 reverse proxy。
# topology: 啟動標準 core API 與 AppleBTS vertical API，兩者共用同一份 ephemeral LiteDB volume。
# database: 不初始化資料；使用 shared local volume 作為暫存資料庫，方便觀察跨 API token / qualification 行為。
# public surface: 直接開放 core API 與 BTS API ports，方便 Swagger、logs 與 API debug。
name: andrewshop-applebts-api-dev

services:
  applebts-api:
    build:
      context: ..
      dockerfile: src/AndrewDemo.NetConf2023.API/Dockerfile
    image: andrewdemo-shop-common-api:local
    ports:
      - "5108:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=AppleBts
      - ASPNETCORE_HTTP_PORTS=8080
      - SHOP_DATABASE_FILEPATH=/data/shop-database.db
      - SHOP_ID=apple-bts
      - Time__Mode=${Time__Mode:-System}
      - Time__ExpectedStartupLocal=${Time__ExpectedStartupLocal:-}
      - Time__TimeZoneId=${Time__TimeZoneId:-Asia/Taipei}
    volumes:
      - applebts-api-dev-data:/data
    restart: "no"

  applebts-btsapi:
    build:
      context: ..
      dockerfile: src/AndrewDemo.NetConf2023.AppleBTS.API/Dockerfile
    image: andrewdemo-shop-applebts-btsapi:local
    ports:
      - "5118:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=AppleBts
      - ASPNETCORE_HTTP_PORTS=8080
      - SHOP_DATABASE_FILEPATH=/data/shop-database.db
      - SHOP_ID=apple-bts
      - Time__Mode=${Time__Mode:-System}
      - Time__ExpectedStartupLocal=${Time__ExpectedStartupLocal:-}
      - Time__TimeZoneId=${Time__TimeZoneId:-Asia/Taipei}
    volumes:
      - applebts-api-dev-data:/data
    restart: "no"

volumes:
  applebts-api-dev-data:
    driver: local
