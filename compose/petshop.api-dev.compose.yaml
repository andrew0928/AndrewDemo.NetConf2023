# site: petshop
# mode: api-dev
# intent: PetShop API 開發、驗證與除錯；不啟動 seed、storefront 或 reverse proxy。
# topology: 啟動標準 core API 與 PetShop reservation API，兩者共用同一份 ephemeral LiteDB volume。
# database: 不初始化資料；使用 shared local volume 作為暫存資料庫，方便觀察 reservation / checkout API 協作。
# public surface: 直接開放 core API 與 PetShop API ports，方便 Swagger、logs 與 API debug。
name: andrewshop-petshop-api-dev

services:
  petshop-api:
    build:
      context: ..
      dockerfile: src/AndrewDemo.NetConf2023.API/Dockerfile
    image: andrewdemo-shop-common-api:local
    ports:
      - "5208:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=PetShop
      - ASPNETCORE_HTTP_PORTS=8080
      - SHOP_DATABASE_FILEPATH=/data/shop-database.db
      - SHOP_ID=petshop
      - Time__Mode=${Time__Mode:-System}
      - Time__ExpectedStartupLocal=${Time__ExpectedStartupLocal:-}
      - Time__TimeZoneId=${Time__TimeZoneId:-Asia/Taipei}
    volumes:
      - petshop-api-dev-data:/data
    restart: "no"

  petshop-reservationapi:
    build:
      context: ..
      dockerfile: src/AndrewDemo.NetConf2023.PetShop.API/Dockerfile
    image: andrewdemo-shop-petshop-reservationapi:local
    ports:
      - "5218:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=PetShop
      - ASPNETCORE_HTTP_PORTS=8080
      - SHOP_DATABASE_FILEPATH=/data/shop-database.db
      - SHOP_ID=petshop
      - Time__Mode=${Time__Mode:-System}
      - Time__ExpectedStartupLocal=${Time__ExpectedStartupLocal:-}
      - Time__TimeZoneId=${Time__TimeZoneId:-Asia/Taipei}
    volumes:
      - petshop-api-dev-data:/data
    restart: "no"

volumes:
  petshop-api-dev-data:
    driver: local
